<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Spend Log" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Spend Log</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Unbounded:wght@300;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #0f0f0f; color: #f0ebe0; font-family: 'DM Mono', 'Courier New', monospace; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    #app { max-width: 480px; margin: 0 auto; padding: 32px 24px 60px; }

    .month-label { font-size: 10px; letter-spacing: 4px; color: #666; margin-bottom: 4px; text-transform: uppercase; }
    .title { font-family: 'Unbounded', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -1px; margin-bottom: 28px; }

    .master-bar-row { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 8px; }
    .bar-track { height: 6px; background: #1e1e1e; border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 16px; margin-bottom: 28px; }
    .mini-item { cursor: pointer; }
    .mini-label-row { display: flex; justify-content: space-between; font-size: 10px; color: #666; margin-bottom: 5px; }
    .mini-track { height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab-btn { flex: 1; padding: 10px 6px; border-radius: 8px; font-size: 18px; border: 1px solid #222; background: #1a1a1a; color: #555; cursor: pointer; transition: all 0.2s ease; }
    .tab-btn.active { color: #0f0f0f; }
    .tab-btn:hover { transform: translateY(-2px); }

    .cat-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
    .cat-name { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700; }
    .cat-remaining { font-size: 11px; color: #555; }

    .input-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .amount-wrap { display: flex; align-items: center; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 0 14px; min-width: 130px; width: 130px; }
    .dollar { color: #555; font-size: 13px; margin-right: 4px; }
    .amount-input { background: transparent; border: none; color: #f0ebe0; font-size: 16px; font-family: 'DM Mono', monospace; width: 100%; outline: none; padding: 14px 0; }
    .note-input { flex: 1; background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px; color: #f0ebe0; font-size: 16px; font-family: 'DM Mono', monospace; outline: none; }
    .add-btn { border-radius: 8px; padding: 0 18px; font-size: 22px; font-weight: 700; color: #0f0f0f; border: none; cursor: pointer; transition: transform 0.15s ease; }
    .add-btn:hover { transform: scale(1.04); }
    .add-btn:active { transform: scale(0.96); }

    .empty { text-align: center; color: #333; font-size: 12px; padding: 40px 0; letter-spacing: 2px; }
    .entry { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid #1a1a1a; animation: slideIn 0.25s ease forwards; }
    .entry-note { font-size: 13px; color: #f0ebe0; margin-bottom: 3px; }
    .entry-date { font-size: 10px; color: #444; letter-spacing: 1px; }
    .entry-right { display: flex; align-items: center; gap: 10px; }
    .entry-amount { font-size: 15px; font-weight: 500; }
    .del-btn { background: transparent; border: none; color: #444; font-size: 18px; cursor: pointer; padding: 2px 8px; line-height: 1; transition: color 0.15s; }
    .del-btn:hover { color: #ff6b6b; }
    .show-more { background: transparent; border: none; color: #555; font-size: 11px; letter-spacing: 2px; padding: 16px 0; width: 100%; text-align: center; text-transform: uppercase; cursor: pointer; }
    .show-more:hover { color: #888; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div id="app"></div>
<script>
  const BUDGETS = {
    food:   { label: "Groceries",  limit: 250, color: "#e8c547", emoji: "🛒" },
    eating: { label: "Eating Out", limit: 200, color: "#e87d47", emoji: "🌮" },
    fun:    { label: "Fun & Misc", limit: 220, color: "#a78bfa", emoji: "✨" },
    gas:    { label: "Gas",        limit: 100, color: "#47c9e8", emoji: "⛽" },
  };
  const KEYS = Object.keys(BUDGETS);

  function getMonthKey() { const d = new Date(); return `budget_${d.getFullYear()}_${d.getMonth()}`; }
  function getMonthName() { return new Date().toLocaleString("default", { month: "long", year: "numeric" }); }
  function formatDate(iso) { return new Date(iso).toLocaleDateString("en-US", { month: "short", day: "numeric" }); }
  function loadEntries() { try { return JSON.parse(localStorage.getItem(getMonthKey())) || []; } catch { return []; } }
  function saveEntries(e) { try { localStorage.setItem(getMonthKey(), JSON.stringify(e)); } catch {} }

  let entries = loadEntries();
  let activeTab = "eating";
  let showAll = false;
  let rawDigits = "";

  function formatRaw(digits) {
    if (!digits) return "";
    const padded = digits.padStart(3, "0");
    const cents = padded.slice(-2);
    const dollars = padded.slice(0, -2).replace(/^0+/, "") || "0";
    return `${dollars}.${cents}`;
  }

  function getTotals() {
    const t = {};
    KEYS.forEach(k => t[k] = 0);
    entries.forEach(e => t[e.category] = (t[e.category] || 0) + e.amount);
    return t;
  }

  function addEntry() {
    const noteEl = document.getElementById("note-input");
    const val = parseFloat(formatRaw(rawDigits));
    if (!val || val <= 0) { document.getElementById("amount-input").focus(); return; }
    entries.unshift({
      id: Date.now(),
      category: activeTab,
      amount: val,
      note: noteEl.value.trim() || BUDGETS[activeTab].label,
      date: new Date().toISOString(),
    });
    saveEntries(entries);
    rawDigits = "";
    noteEl.value = "";
    render();
    document.getElementById("amount-input").focus();
  }

  function removeEntry(id) {
    entries = entries.filter(e => e.id !== id);
    saveEntries(entries);
    render();
  }

  function setTab(tab) { activeTab = tab; showAll = false; render(); }
  function toggleShowAll() { showAll = !showAll; render(); }

  function bindAmountInput() {
    const el = document.getElementById("amount-input");
    if (!el) return;
    el.value = formatRaw(rawDigits);

    el.addEventListener("keydown", function(e) {
      if (e.key === "Enter") { e.preventDefault(); addEntry(); return; }
      if (e.key === "Backspace" || e.key === "Delete") {
        e.preventDefault();
        rawDigits = rawDigits.slice(0, -1);
        el.value = formatRaw(rawDigits);
        return;
      }
      if (["Tab","ArrowLeft","ArrowRight"].includes(e.key)) return;
      if (!/^\d$/.test(e.key)) { e.preventDefault(); return; }
      if (rawDigits.length >= 7) { e.preventDefault(); return; }
      e.preventDefault();
      rawDigits += e.key;
      el.value = formatRaw(rawDigits);
    });

    // Mobile: intercept the input event after iOS keyboard fires
    el.addEventListener("input", function() {
      const digits = el.value.replace(/\D/g, "").slice(-7);
      rawDigits = digits;
      el.value = formatRaw(rawDigits);
    });
  }

  function render() {
    const totals = getTotals();
    const totalSpent = Object.values(totals).reduce((a, b) => a + b, 0);
    const totalBudget = Object.values(BUDGETS).reduce((a, b) => a + b.limit, 0);
    const totalPct = Math.min((totalSpent / totalBudget) * 100, 100);
    const isOver = totalSpent > totalBudget;
    const b = BUDGETS[activeTab];
    const activeEntries = entries.filter(e => e.category === activeTab);
    const displayEntries = showAll ? activeEntries : activeEntries.slice(0, 5);

    const miniBars = KEYS.map(key => {
      const bk = BUDGETS[key];
      const spent = totals[key] || 0;
      const pct = Math.min((spent / bk.limit) * 100, 100);
      const over = spent > bk.limit;
      const isActive = key === activeTab;
      return `<div class="mini-item" onclick="setTab('${key}')">
        <div class="mini-label-row">
          <span style="color:${isActive ? bk.color : '#666'}">${bk.label.toUpperCase()}</span>
          <span style="color:${over ? '#ff6b6b' : '#888'}">$${spent.toFixed(0)}/$${bk.limit}</span>
        </div>
        <div class="mini-track">
          <div class="mini-fill" style="width:${pct}%;background:${over ? '#ff6b6b' : bk.color};opacity:${isActive ? 1 : 0.5}"></div>
        </div>
      </div>`;
    }).join("");

    const tabs = KEYS.map(key => {
      const bk = BUDGETS[key];
      const isActive = key === activeTab;
      return `<button class="tab-btn ${isActive ? 'active' : ''}"
        style="${isActive ? `background:${bk.color};border-color:${bk.color}` : ''}"
        onclick="setTab('${key}')">${bk.emoji}</button>`;
    }).join("");

    let entriesHTML = "";
    if (activeEntries.length === 0) {
      entriesHTML = `<div class="empty">NO ENTRIES YET</div>`;
    } else {
      entriesHTML = displayEntries.map((entry, i) => `
        <div class="entry" style="animation-delay:${i * 0.04}s">
          <div>
            <div class="entry-note">${entry.note}</div>
            <div class="entry-date">${formatDate(entry.date)}</div>
          </div>
          <div class="entry-right">
            <span class="entry-amount" style="color:${b.color}">$${entry.amount.toFixed(2)}</span>
            <button class="del-btn" onclick="removeEntry(${entry.id})">×</button>
          </div>
        </div>`).join("");
      if (activeEntries.length > 5) {
        entriesHTML += `<button class="show-more" onclick="toggleShowAll()">
          ${showAll ? '↑ show less' : `+ ${activeEntries.length - 5} more`}
        </button>`;
      }
    }

    const remaining = b.limit - (totals[activeTab] || 0);

    document.getElementById("app").innerHTML = `
      <div class="month-label">${getMonthName()}</div>
      <div class="title">SPENDING LOG</div>
      <div class="master-bar-row">
        <span>TOTAL SPENT</span>
        <span style="color:${isOver ? '#ff6b6b' : '#f0ebe0'}">
          $${totalSpent.toFixed(2)} <span style="color:#555">/ $${totalBudget}</span>
        </span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${totalPct}%;background:${isOver ? '#ff6b6b' : 'linear-gradient(90deg,#e8c547,#e87d47)'}"></div>
      </div>
      <div class="mini-grid">${miniBars}</div>
      <div class="tabs">${tabs}</div>
      <div class="cat-header">
        <div class="cat-name" style="color:${b.color}">${b.label.toUpperCase()}</div>
        <div class="cat-remaining" style="color:${remaining < 0 ? '#ff6b6b' : '#555'}">
          ${remaining < 0 ? '-$' + Math.abs(remaining).toFixed(2) + ' over' : '$' + remaining.toFixed(2) + ' left'}
        </div>
      </div>
      <div class="input-row">
        <div class="amount-wrap">
          <span class="dollar">$</span>
          <input id="amount-input" class="amount-input" type="text" inputmode="numeric" placeholder="0.00" autocomplete="off" />
        </div>
        <input id="note-input" class="note-input" type="text" placeholder="what was it?" autocomplete="off" />
        <button class="add-btn" style="background:${b.color}" onclick="addEntry()">+</button>
      </div>
      <div id="entries">${entriesHTML}</div>
    `;

    bindAmountInput();
    document.getElementById("note-input").addEventListener("keydown", e => { if (e.key === "Enter") addEntry(); });
  }

  render();

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
